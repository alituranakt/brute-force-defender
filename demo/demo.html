<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reverse Engineering Tool Demo</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #45f3ff;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            background-color: #1f2833;
            border: 2px solid #45f3ff;
            border-radius: 5px;
            padding: 20px;
            height: 90vh;
            overflow-y: auto;
            white-space: pre-wrap;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
        }
        .cmd { color: #f2a900; font-weight: bold; }
        .success { color: #5cb85c; }
        .warning { color: #f0ad4e; }
        .danger { color: #d9534f; }
        .highlight { color: #c5c6c7; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #45f3ff; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const commands = [
            { text: "$ make build", type: "cmd", delay: 1000 },
            { text: "Compiling RE Tool core modules...", type: "highlight", delay: 500 },
            { text: "Linking dependencies...", type: "highlight", delay: 500 },
            { text: "Build successful. Output: ./re_tool", type: "success", delay: 1000 },
            
            { text: "\n$ ./re_tool analyze samples/malware.exe", type: "cmd", delay: 1500 },
            { text: "[*] Initializing analysis engine...", type: "highlight", delay: 500 },
            { text: "[*] Extracting PE Headers...", type: "highlight", delay: 600 },
            { text: "  -> Magic: 0x5A4D (MZ)", type: "normal", delay: 300 },
            { text: "  -> Machine: 0x014C (x86)", type: "normal", delay: 300 },
            { text: "  -> TimeDateStamp: 0x5F1B2C3D", type: "normal", delay: 300 },
            
            { text: "\n[*] Analyzing Sections...", type: "highlight", delay: 600 },
            { text: "  | Name   | V.Size | R.Size | Entropy |", type: "normal", delay: 200 },
            { text: "  |--------|--------|--------|---------|", type: "normal", delay: 200 },
            { text: "  | .text  | 0x1A00 | 0x1A00 | 6.81    |", type: "warning", delay: 200 },
            { text: "  | .rdata | 0x0400 | 0x0400 | 3.25    |", type: "normal", delay: 200 },
            { text: "  | .data  | 0x0200 | 0x0200 | 1.10    |", type: "normal", delay: 200 },
            
            { text: "\n[*] Extracting Import Table...", type: "highlight", delay: 600 },
            { text: "  => KERNEL32.dll", type: "normal", delay: 300 },
            { text: "     - VirtualAlloc (Suspicious)", type: "danger", delay: 200 },
            { text: "     - CreateRemoteThread (Suspicious)", type: "danger", delay: 200 },
            { text: "     - LoadLibraryA", type: "normal", delay: 200 },
            { text: "  => WS2_32.dll", type: "normal", delay: 300 },
            { text: "     - WSAStartup", type: "normal", delay: 200 },
            
            { text: "\n[*] Disassembling Entry Point (0x401000)...", type: "highlight", delay: 800 },
            { text: "  0x401000: 55             push ebp", type: "normal", delay: 100 },
            { text: "  0x401001: 8B EC          mov ebp, esp", type: "normal", delay: 100 },
            { text: "  0x401003: 81 EC 40 00 00 sub esp, 0x40", type: "normal", delay: 100 },
            { text: "  0x401009: 53             push ebx", type: "normal", delay: 100 },
            { text: "  0x40100A: 56             push esi", type: "normal", delay: 100 },
            { text: "  0x40100B: 57             push edi", type: "normal", delay: 100 },
            { text: "  0x40100C: E8 14 00 00 00 call 0x401025", type: "warning", delay: 400 },
            
            { text: "\n[*] Malware Indicators & Entropy Analysis...", type: "highlight", delay: 1000 },
            { text: "  [!] HIGH ENTROPY DETECTED in .text section (6.81) - Possible Packing/Obfuscation.", type: "danger", delay: 600 },
            { text: "  [!] Injection APIs found (VirtualAlloc, CreateRemoteThread).", type: "danger", delay: 600 },
            
            { text: "\n[*] Generating Report...", type: "highlight", delay: 800 },
            { text: "  -> Output format set to: JSON", type: "normal", delay: 300 },
            { text: "  -> Report saved to: report_malware.json", type: "success", delay: 300 },
            
            { text: "\n$ ./re_tool compare samples/malware.exe samples/clean.exe", type: "cmd", delay: 1500 },
            { text: "[*] Comparing binaries...", type: "highlight", delay: 500 },
            { text: "  -> Differences in Imports: malware.exe has [VirtualAlloc, CreateRemoteThread]", type: "warning", delay: 400 },
            { text: "  -> Entropy Mismatch: malware.exe (Avg 5.9), clean.exe (Avg 3.1)", type: "warning", delay: 400 },
            { text: "  -> Structure Match: 12% similarity.", type: "normal", delay: 400 },
            { text: "Done.", type: "success", delay: 1000 }
        ];

        const terminal = document.getElementById("terminal");
        let i = 0;

        function typeWriter(text, type, idx = 0, callback) {
            if (idx === 0) {
                const el = document.createElement("span");
                el.className = type;
                el.id = "current-line";
                terminal.insertBefore(el, document.getElementById("cursor"));
            }
            const currentLine = document.getElementById("current-line");
            if (idx < text.length) {
                currentLine.innerHTML += text.charAt(idx) === '\n' ? '<br>' : text.charAt(idx);
                terminal.scrollTop = terminal.scrollHeight;
                setTimeout(() => typeWriter(text, type, idx + 1, callback), 20); // typing speed
            } else {
                currentLine.removeAttribute("id");
                currentLine.innerHTML += "<br>";
                setTimeout(callback, 100);
            }
        }

        function runTerminal() {
            if (i < commands.length) {
                setTimeout(() => {
                    const line = commands[i].text;
                    typeWriter(line, commands[i].type, 0, () => {
                        i++;
                        runTerminal();
                    });
                }, commands[i].delay);
            }
        }

        // Add cursor
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        cursor.id = "cursor";
        terminal.appendChild(cursor);

        // Start
        setTimeout(runTerminal, 1000);
    </script>
</body>
</html>
